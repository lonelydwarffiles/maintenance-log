services:
  maintenance-log:
    build: .
    restart: unless-stopped
    ports:
      - "8124:8124"
    volumes:
      - maintenance-data:/app/data
    environment:
      - MAINTENANCE_DB_PATH=/app/data/maintenance.db
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8124
  cloudflared:
    image: cloudflare/cloudflared:latest
    # Notice how we completely removed any mention of /bin/sh!
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN} # Make sure the token is passed here!
volumes:
  maintenance-data:

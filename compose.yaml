services:
  maintenance-log:
    build: .
    restart: unless-stopped
    ports:
      - "8124:8124"
    volumes:
      - maintenance-data:/app/data
    environment:
      - MAINTENANCE_DB_PATH=/app/data/maintenance.db
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8124
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - tunnel
    restart: unless-stopped
    depends_on:
      - maintenance-log
    environment:
      - CLOUDFLARED_TUNNEL_TOKEN
    command: '/bin/sh -ec ''test -n "$$CLOUDFLARED_TUNNEL_TOKEN" || { echo "CLOUDFLARED_TUNNEL_TOKEN is required"; exit 1; }; exec cloudflared tunnel --no-autoupdate run --token "$$CLOUDFLARED_TUNNEL_TOKEN"'''

volumes:
  maintenance-data:
